<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pathworlds — The Universe</title>
<meta name="description" content="Choose a world to explore. An interactive atlas of the Pathworlds universe.">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%; overflow: hidden;
  background: #04030a;
  font-family: 'Crimson Text', serif;
  cursor: default;
}

/* ── STARS ── */
#starfield {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none;
}

/* ── MAIN LAYOUT ── */
#universe {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}

/* ── HEADER ── */
#header {
  text-align: center; margin-bottom: 60px;
  animation: fadeUp 1.4s ease forwards;
}
#header h1 {
  font-family: 'Cinzel Decorative', serif; font-size: 38px; font-weight: 700;
  color: #e8cc7a; letter-spacing: 0.08em;
  text-shadow: 0 0 40px rgba(201,168,76,0.3);
}
#header p {
  font-family: 'Crimson Text', serif; font-style: italic; font-size: 15px;
  color: #c8b98a; margin-top: 8px; letter-spacing: 0.04em; opacity: 0.8;
}
#header-divider {
  width: 100px; height: 1px; margin: 14px auto 0;
  background: linear-gradient(to right, transparent, #c9a84c, transparent);
}

/* ── PATH LINE ── */
#path-wrap {
  position: relative; width: 100%; max-width: 900px;
  display: flex; align-items: center; justify-content: center;
  animation: fadeUp 1.6s ease forwards;
}

canvas#path-canvas {
  position: absolute; inset: 0; pointer-events: none; z-index: 0;
}

/* ── PLANETS ROW ── */
#planets {
  display: flex; align-items: center; justify-content: center;
  gap: 0; width: 100%; position: relative; z-index: 2;
  padding: 40px 0;
}

.planet-slot {
  display: flex; flex-direction: column; align-items: center;
  flex: 1; max-width: 160px; gap: 16px;
}

.planet-orb {
  border-radius: 50%; position: relative;
  transition: transform 0.3s ease, filter 0.3s ease;
  cursor: pointer;
}
.planet-orb:hover { transform: scale(1.08); }

/* Quellia — active, glowing gold */
.planet-orb.quellia {
  width: 90px; height: 90px;
  background: radial-gradient(circle at 35% 35%, #f0d890, #c9a84c 50%, #8a6820);
  box-shadow: 0 0 30px rgba(201,168,76,0.6), 0 0 60px rgba(201,168,76,0.25);
  animation: pulse-quellia 3s ease-in-out infinite;
}
@keyframes pulse-quellia {
  0%,100% { box-shadow: 0 0 30px rgba(201,168,76,0.6), 0 0 60px rgba(201,168,76,0.25); }
  50% { box-shadow: 0 0 50px rgba(201,168,76,0.9), 0 0 90px rgba(201,168,76,0.4); }
}

/* Locked planets — dim gold */
.planet-orb.locked {
  cursor: not-allowed;
  filter: grayscale(0.2) brightness(0.4);
}
.planet-orb.locked:hover { transform: scale(1.03); filter: grayscale(0.1) brightness(0.55); }

.planet-orb.aplosia {
  width: 70px; height: 70px;
  background: radial-gradient(circle at 35% 35%, #e8d080, #c9a84c 50%, #8a6820);
  box-shadow: 0 0 20px rgba(201,168,76,0.2);
}
.planet-orb.fruth {
  width: 75px; height: 75px;
  background: radial-gradient(circle at 35% 35%, #f0d890, #c9a84c 50%, #7a5810);
  box-shadow: 0 0 20px rgba(201,168,76,0.2);
}
.planet-orb.unknown1 {
  width: 55px; height: 55px;
  background: radial-gradient(circle at 35% 35%, #d8c070, #a88030 50%, #604810);
  box-shadow: 0 0 15px rgba(201,168,76,0.15);
}
.planet-orb.unknown2 {
  width: 65px; height: 65px;
  background: radial-gradient(circle at 35% 35%, #e8d080, #b89040 50%, #705820);
  box-shadow: 0 0 18px rgba(201,168,76,0.15);
}
.planet-orb.unknown3 {
  width: 50px; height: 50px;
  background: radial-gradient(circle at 35% 35%, #d0b860, #987828 50%, #584010);
  box-shadow: 0 0 14px rgba(201,168,76,0.15);
}

/* Ring for Fruth */
.planet-orb.fruth::after {
  content: ''; position: absolute;
  width: 110%; height: 30%;
  border: 2px solid rgba(220,190,100,0.35);
  border-radius: 50%;
  top: 35%; left: -5%;
  transform: rotateX(70deg);
}

/* Lock icon */
.lock-icon {
  position: absolute; bottom: -4px; right: -4px;
  width: 20px; height: 20px; border-radius: 50%;
  background: rgba(10,8,6,0.9); border: 1px solid rgba(201,168,76,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
}

/* Planet labels */
.planet-label {
  text-align: center;
}
.planet-name {
  font-family: 'Cinzel', serif; font-size: 13px;
  color: #e8dfc0; letter-spacing: 0.08em;
}
.planet-name.locked-text { color: #4a3a2a; }
.planet-sub {
  font-family: 'Crimson Text', serif; font-style: italic;
  font-size: 11px; color: #6a5a3a; margin-top: 3px;
}

/* ── TOOLTIP ── */
#tooltip {
  position: fixed; z-index: 200;
  background: rgba(10,8,6,0.95); border: 1px solid rgba(201,168,76,0.3);
  border-radius: 6px; padding: 12px 16px;
  font-family: 'Crimson Text', serif; font-size: 14px; color: #c8b98a;
  pointer-events: none; opacity: 0; transition: opacity 0.2s;
  max-width: 220px; line-height: 1.5; backdrop-filter: blur(8px);
}
#tooltip.visible { opacity: 1; }
#tooltip strong { font-family: 'Cinzel', serif; font-size: 12px; color: #e8cc7a; display: block; margin-bottom: 4px; letter-spacing: 0.06em; }

/* ── ENTER OVERLAY ── */
#enter-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: #04030a; opacity: 0; pointer-events: none;
  transition: opacity 1s ease;
}
#enter-overlay.fade-in { opacity: 1; }

/* ── ANIMATIONS ── */
@keyframes fadeUp { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
@keyframes twinkle { 0%,100%{opacity:0.3} 50%{opacity:1} }

/* ── FOOTER ── */
#footer {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 0.14em;
  color: rgba(201,168,76,0.25); white-space: nowrap;
}

@media (max-width: 600px) {
  #header h1 { font-size: 26px; }
  #path-wrap { max-width: 100%; padding: 0 10px; }
  .planet-orb.quellia { width: 70px; height: 70px; }
  .planet-orb.aplosia { width: 54px; height: 54px; }
  .planet-orb.fruth { width: 58px; height: 58px; }
  .planet-orb.unknown1 { width: 42px; height: 42px; }
  .planet-orb.unknown2 { width: 50px; height: 50px; }
  .planet-orb.unknown3 { width: 38px; height: 38px; }
  .planet-name { font-size: 11px; }
}
</style>
</head>
<body>

<canvas id="starfield"></canvas>
<div id="enter-overlay"></div>

<div id="universe">
  <div id="header">
    <h1>Pathworlds</h1>
    <div id="header-divider"></div>
    <p>Choose a world to explore</p>
  </div>

  <div id="path-wrap">
    <canvas id="path-canvas"></canvas>
    <div id="planets">

      <!-- Unknown 1 -->
      <div class="planet-slot">
        <div class="planet-orb unknown1 locked" onclick="lockedClick(this)" onmouseenter="showTip(event,'Unknown World','This world has not yet been discovered by pathflight.')" onmouseleave="hideTip()">
          <div class="lock-icon">🔒</div>
        </div>
        <div class="planet-label">
          <div class="planet-name locked-text">???</div>
          <div class="planet-sub">Undiscovered</div>
        </div>
      </div>

      <!-- Fruth -->
      <div class="planet-slot">
        <div class="planet-orb fruth locked" onclick="lockedClick(this)" onmouseenter="showTip(event,'Fruth','The sister planet of Quellia. Its path has been closed for over one hundred years.')" onmouseleave="hideTip()">
          <div class="lock-icon">🔒</div>
        </div>
        <div class="planet-label">
          <div class="planet-name locked-text">Fruth</div>
          <div class="planet-sub">Path closed</div>
        </div>
      </div>

      <!-- Quellia — ACTIVE -->
      <div class="planet-slot">
        <div class="planet-orb quellia" onclick="enterQuellia()" onmouseenter="showTip(event,'Quellia','Home of the Kingdom of Temmia &amp; where our story begins.')" onmouseleave="hideTip()">
        </div>
        <div class="planet-label">
          <div class="planet-name" style="color:#e8cc7a;">Quellia</div>
          <div class="planet-sub" style="color:#8a7a5a;">Click to explore</div>
        </div>
      </div>

      <!-- Aplosia -->
      <div class="planet-slot">
        <div class="planet-orb aplosia locked" onclick="lockedClick(this)" onmouseenter="showTip(event,'Aplosia','A neighbouring world, home of the Kingdom of Ca\'agath. Its path to Quellia has been closed for twenty-nine years.')" onmouseleave="hideTip()">
          <div class="lock-icon">🔒</div>
        </div>
        <div class="planet-label">
          <div class="planet-name locked-text">Aplosia</div>
          <div class="planet-sub">Path closed</div>
        </div>
      </div>

      <!-- Unknown 2 -->
      <div class="planet-slot">
        <div class="planet-orb unknown2 locked" onclick="lockedClick(this)" onmouseenter="showTip(event,'Unknown World','This world has not yet been discovered by pathflight.')" onmouseleave="hideTip()">
          <div class="lock-icon">🔒</div>
        </div>
        <div class="planet-label">
          <div class="planet-name locked-text">???</div>
          <div class="planet-sub">Undiscovered</div>
        </div>
      </div>

      <!-- Unknown 3 -->
      <div class="planet-slot">
        <div class="planet-orb unknown3 locked" onclick="lockedClick(this)" onmouseenter="showTip(event,'Unknown World','This world lies beyond the reach of the known paths.')" onmouseleave="hideTip()">
          <div class="lock-icon">🔒</div>
        </div>
        <div class="planet-label">
          <div class="planet-name locked-text">???</div>
          <div class="planet-sub">Undiscovered</div>
        </div>
      </div>

    </div>
  </div>
</div>

<div id="tooltip"><strong id="tip-name"></strong><span id="tip-desc"></span></div>
<div id="footer">THE PATHWORLDS UNIVERSE — c. 778 A.A.</div>

<script>
// ── STARFIELD ─────────────────────────────────────────────────────────────────
const sf = document.getElementById('starfield');
const sctx = sf.getContext('2d');
let stars = [];

function resizeStarfield() {
  sf.width = window.innerWidth;
  sf.height = window.innerHeight;
}

function initStars() {
  stars = [];
  for (let i = 0; i < 280; i++) {
    stars.push({
      x: Math.random() * sf.width,
      y: Math.random() * sf.height,
      r: Math.random() * 1.2 + 0.2,
      o: Math.random(),
      speed: Math.random() * 0.005 + 0.002,
      phase: Math.random() * Math.PI * 2,
    });
  }
}

function drawStars() {
  sctx.clearRect(0, 0, sf.width, sf.height);
  const t = Date.now() * 0.001;
  stars.forEach(s => {
    const opacity = 0.2 + 0.6 * (0.5 + 0.5 * Math.sin(t * s.speed * 10 + s.phase));
    sctx.beginPath();
    sctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    sctx.fillStyle = `rgba(255,248,220,${opacity})`;
    sctx.fill();
  });
  requestAnimationFrame(drawStars);
}

resizeStarfield();
initStars();
drawStars();
window.addEventListener('resize', () => { resizeStarfield(); initStars(); drawPath(); });

// ── GOLDEN PATH ───────────────────────────────────────────────────────────────
const pc = document.getElementById('path-canvas');
const pctx = pc.getContext('2d');
let pathOffset = 0;

function drawPath() {
  const wrap = document.getElementById('path-wrap');
  pc.width = wrap.offsetWidth;
  pc.height = wrap.offsetHeight;

  const planets = document.querySelectorAll('.planet-orb');
  if (planets.length === 0) return;

  const wrapRect = wrap.getBoundingClientRect();
  const points = [];

  planets.forEach(p => {
    const r = p.getBoundingClientRect();
    points.push({
      x: r.left - wrapRect.left + r.width / 2,
      y: r.top - wrapRect.top + r.height / 2,
    });
  });

  pctx.clearRect(0, 0, pc.width, pc.height);

  const avgY = points.reduce((sum, p) => sum + p.y, 0) / points.length;

  // Extend path to full screen edges
  const screenStartX = -wrapRect.left;
  const screenEndX = window.innerWidth - wrapRect.left;
  const totalWidth = screenEndX - screenStartX;
  const fadeWidth = 160;

  // Outer glow — full width
  pctx.beginPath();
  pctx.moveTo(screenStartX, avgY);
  pctx.lineTo(screenEndX, avgY);
  pctx.strokeStyle = 'rgba(201,168,76,0.06)';
  pctx.lineWidth = 18;
  pctx.stroke();

  // Main tube — full width
  pctx.beginPath();
  pctx.moveTo(screenStartX, avgY);
  pctx.lineTo(screenEndX, avgY);
  pctx.strokeStyle = 'rgba(201,168,76,0.25)';
  pctx.lineWidth = 4;
  pctx.stroke();

  // Fade edges so path dissolves into void
  const gradLeft = pctx.createLinearGradient(screenStartX, 0, screenStartX + fadeWidth, 0);
  gradLeft.addColorStop(0, 'rgba(4,3,10,1)');
  gradLeft.addColorStop(1, 'rgba(4,3,10,0)');
  pctx.fillStyle = gradLeft;
  pctx.fillRect(screenStartX, avgY - 14, fadeWidth, 28);

  const gradRight = pctx.createLinearGradient(screenEndX - fadeWidth, 0, screenEndX, 0);
  gradRight.addColorStop(0, 'rgba(4,3,10,0)');
  gradRight.addColorStop(1, 'rgba(4,3,10,1)');
  pctx.fillStyle = gradRight;
  pctx.fillRect(screenEndX - fadeWidth, avgY - 14, fadeWidth, 28);

  // Animated star particles across full width
  for (let i = 0; i < 80; i++) {
    const pos = ((i / 80) + pathOffset) % 1;
    const x = screenStartX + pos * totalWidth;
    const edgeFade = Math.min(1, Math.min(x - screenStartX, screenEndX - x) / fadeWidth);
    const size = Math.random() * 1.8 + 0.4;
    const opacity = (0.2 + 0.8 * Math.sin(pos * Math.PI)) * edgeFade;
    pctx.beginPath();
    pctx.arc(x, avgY, size, 0, Math.PI * 2);
    pctx.fillStyle = `rgba(232,204,122,${opacity})`;
    pctx.fill();
  }
}

function animatePath() {
  pathOffset = (pathOffset + 0.0004) % 1;
  drawPath();
  requestAnimationFrame(animatePath);
}

// Wait for layout then start
setTimeout(() => { drawPath(); animatePath(); }, 100);
window.addEventListener('resize', drawPath);

// ── TOOLTIP ───────────────────────────────────────────────────────────────────
function showTip(e, name, desc) {
  const tip = document.getElementById('tooltip');
  document.getElementById('tip-name').textContent = name;
  document.getElementById('tip-desc').textContent = desc;
  tip.classList.add('visible');
  moveTip(e);
}
function moveTip(e) {
  const tip = document.getElementById('tooltip');
  const x = Math.min(e.clientX + 14, window.innerWidth - 240);
  const y = Math.min(e.clientY + 14, window.innerHeight - 100);
  tip.style.left = x + 'px';
  tip.style.top = y + 'px';
}
function hideTip() {
  document.getElementById('tooltip').classList.remove('visible');
}
document.addEventListener('mousemove', e => {
  if (document.getElementById('tooltip').classList.contains('visible')) moveTip(e);
});

// ── LOCKED CLICK ──────────────────────────────────────────────────────────────
function lockedClick(el) {
  el.style.animation = 'shake 0.4s ease';
  setTimeout(() => el.style.animation = '', 400);
}

// Add shake keyframe
const style = document.createElement('style');
style.textContent = `@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }`;
document.head.appendChild(style);

// ── ENTER QUELLIA ─────────────────────────────────────────────────────────────
function enterQuellia() {
  const orb = document.querySelector('.planet-orb.quellia');
  const overlay = document.getElementById('enter-overlay');

  // Zoom in effect on planet
  orb.style.transition = 'transform 0.8s ease, filter 0.8s ease';
  orb.style.transform = 'scale(4)';
  orb.style.filter = 'brightness(2)';

  // Fade to black then navigate
  setTimeout(() => {
    overlay.classList.add('fade-in');
  }, 600);

  setTimeout(() => {
    window.location.href = 'quellia.html';
  }, 1600);
}
</script>
</body>
</html>
